# Frontend preview on Vercel. Does not touch Neon or Railway.
#
# Pairing (preferred — safe Neon/Railway preview API):
#   1. Same branch name as an open backend PR, OR
#   2. PR body line: `Backend-PR: #52`, OR
#   3. Label: `backend-pr-52`
# Then VITE_API_URL = that backend PR’s preview Railway API (from its comment).
#
# Opt-in prod (explicit label only — never silent):
#   Label `preview-against-prod` → build against production API and alias
#   STAGING_FRONTEND_URL (stg-portal). Required for login: Railway CORS only
#   allows that host, not random *.vercel.app URLs. Treat as read-only.
#
# Otherwise the job fails — never silently point staging at prod.
#
# Test at STAGING_FRONTEND_URL (e.g. stg-portal.koltto.com), not *.vercel.app.
# VITE_API_URL is injected at CI build time — do not add it to Vercel Preview env
# (Git preview builds are skipped via vercel.json ignoreCommand).
#
# Backend CORS: add https://stg-portal.koltto.com to Railway Shared CORS_ORIGINS
# (PR envs inherit it).
#
# Secrets: VERCEL_TOKEN, BACKEND_GITHUB_TOKEN (read koltto-cloud/backend)
# Vars: VERCEL_ORG_ID, VERCEL_PROJECT_ID, PRODUCTION_API_URL, STAGING_FRONTEND_URL
#       optional BACKEND_GITHUB_REPO (default koltto-cloud/backend)

name: Preview Vercel

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, edited]

concurrency:
  group: preview-vercel-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy_preview:
    name: Vercel Preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Resolve VITE_API_URL
        id: api
        env:
          GH_TOKEN: ${{ secrets.BACKEND_GITHUB_TOKEN }}
          BACKEND_REPO: ${{ vars.BACKEND_GITHUB_REPO || 'koltto-cloud/backend' }}
          PRODUCTION_API_URL: ${{ vars.PRODUCTION_API_URL || 'https://backend-production-7570.up.railway.app' }}
          BRANCH: ${{ github.head_ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set -euo pipefail

          api_url=""
          backend_pr=""
          mode=""
          alias_staging="false"
          allow_prod="false"

          if printf '%s' "$PR_LABELS" | tr ',' '\n' | grep -qx 'preview-against-prod'; then
            allow_prod="true"
          fi

          # Explicit Backend-PR: #N in the PR body (wins over branch-name match when set)
          body_pr="$(printf '%s\n' "$PR_BODY" | grep -oiE 'Backend-PR:[[:space:]]*#?[0-9]+' | head -1 | grep -oE '[0-9]+' || true)"

          # Label backend-pr-N
          label_pr="$(printf '%s' "$PR_LABELS" | tr ',' '\n' | grep -oE '^backend-pr-[0-9]+$' | head -1 | grep -oE '[0-9]+' || true)"

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::BACKEND_GITHUB_TOKEN is not set; cannot resolve a backend preview API."
            exit 1
          fi

          if [ -n "$body_pr" ]; then
            backend_pr="$body_pr"
            echo "Backend PR from PR body: #$backend_pr"
          elif [ -n "$label_pr" ]; then
            backend_pr="$label_pr"
            echo "Backend PR from label: #$backend_pr"
          else
            branch_pr="$(gh pr list --repo "$BACKEND_REPO" --head "$BRANCH" --state open --json number -q '.[0].number' || true)"
            if [ -n "$branch_pr" ] && [ "$branch_pr" != "null" ]; then
              backend_pr="$branch_pr"
              echo "Backend PR from matching branch $BRANCH: #$backend_pr"
            fi
          fi

          if [ -n "$backend_pr" ]; then
            state="$(gh pr view "$backend_pr" --repo "$BACKEND_REPO" --json state -q .state || true)"
            if [ "$state" != "OPEN" ]; then
              echo "::error::Backend PR #$backend_pr is not open (state=$state)."
              exit 1
            fi
            for attempt in $(seq 1 36); do
              comments="$(gh api "repos/$BACKEND_REPO/issues/$backend_pr/comments" --jq '.[].body' || true)"
              found="$(printf '%s\n' "$comments" | grep -oE 'API: `https://[^`]+`' | head -1 | sed 's/API: `//;s/`$//' || true)"
              if [ -n "$found" ]; then
                api_url="$found"
                mode="backend-pr-$backend_pr"
                alias_staging="true"
                break
              fi
              echo "Waiting for backend preview API URL (attempt $attempt)…"
              sleep 10
            done
            if [ -z "$api_url" ]; then
              echo "::error::Timed out waiting for backend PR #$backend_pr preview API comment."
              exit 1
            fi
          elif [ "$allow_prod" = "true" ]; then
            api_url="$PRODUCTION_API_URL"
            mode="production-api-opt-in"
            # Alias stg-portal: login needs CORS, and only that host is allowlisted
            # (not *.vercel.app). Label is the explicit opt-in; never do this silently.
            alias_staging="true"
            echo "::warning::preview-against-prod: staging portal will talk to PRODUCTION API. Do not mutate prod data."
          else
            {
              echo "::error::No backend preview pairing found. Refusing to point the staging portal at production."
              echo "::error::Add one of: same branch as an open backend PR | PR body line Backend-PR: #52 | label backend-pr-52"
              echo "::error::For deliberate prod-backed UI smoke (CORS/login): label preview-against-prod — aliases stg-portal; treat as read-only."
            }
            exit 1
          fi

          echo "api_url=$api_url" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "backend_pr=$backend_pr" >> "$GITHUB_OUTPUT"
          echo "alias_staging=$alias_staging" >> "$GITHUB_OUTPUT"
          echo "Using VITE_API_URL=$api_url ($mode) alias_staging=$alias_staging"

      - name: Build and deploy to Vercel Preview
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_API_URL: ${{ steps.api.outputs.api_url }}
          STAGING_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL || 'https://stg-portal.koltto.com' }}
          ALIAS_STAGING: ${{ steps.api.outputs.alias_staging }}
        run: |
          set -euo pipefail
          npm ci
          npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          echo "VITE_API_URL=$VITE_API_URL" >> .vercel/.env.preview.local
          VITE_API_URL="$VITE_API_URL" npx vercel build --token="$VERCEL_TOKEN"
          url="$(npx vercel deploy --prebuilt --yes --token="$VERCEL_TOKEN")"
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed: $url"
          if [ "$ALIAS_STAGING" = "true" ]; then
            staging="${STAGING_FRONTEND_URL#https://}"
            staging="${staging#http://}"
            npx vercel alias set "$url" "$staging" --token="$VERCEL_TOKEN"
            echo "Aliased https://$staging -> $url"
            echo "test_url=$STAGING_FRONTEND_URL" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping staging alias."
            echo "test_url=$url" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const apiUrl = `${{ steps.api.outputs.api_url }}`;
            const mode = `${{ steps.api.outputs.mode }}`;
            const backendPr = `${{ steps.api.outputs.backend_pr }}`;
            const aliasStaging = `${{ steps.api.outputs.alias_staging }}`;
            const testUrl = `${{ steps.deploy.outputs.test_url }}`;
            const stagingUrl = `${{ vars.STAGING_FRONTEND_URL || 'https://stg-portal.koltto.com' }}`;
            const lines = [
              `### Vercel preview ready`,
              ``,
              `- Test at: ${testUrl}`,
              `- \`VITE_API_URL\`: \`${apiUrl}\` (${mode})`,
            ];
            if (backendPr) {
              lines.push(`- Matching backend PR: #${backendPr}`);
            }
            if (aliasStaging === 'true') {
              lines.push(`- Staging alias updated: ${stagingUrl}`);
            }
            if (mode === 'production-api-opt-in') {
              lines.push(``);
              lines.push(`⚠️ **Production API** via \`preview-against-prod\` (CORS requires \`${stagingUrl}\`). Do **not** create/update/delete data.`);
            }
            const body = lines.join("\n");

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = "### Vercel preview ready";
            const existing = comments.find((c) => c.user?.type === "Bot" && c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
